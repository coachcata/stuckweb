<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coaching</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ffffff;
      --bg-secondary: #f7f7f5;
      --border:       #e5e5e2;
      --text:         #1a1a1a;
      --text-muted:   #888884;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* ── HERO ── */
    .hero {
      padding: 6rem 0 5rem;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.2rem;
    }
    .hero p {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 560px;
      margin: 0 auto 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      background: var(--text);
      color: var(--bg);
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }

    /* ── LOGO BAR ── */
    .logo-bar {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 2.2rem 0;
      background: var(--bg-secondary);
    }
    .logo-bar__label {
      text-align: center;
      margin-bottom: 1.4rem;
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
    }
    .logo-bar__logos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 1rem 3rem;
    }
    .logo-bar__item {
      opacity: 0.45;
      filter: grayscale(1);
      transition: opacity 0.2s;
    }
    .logo-bar__item:hover { opacity: 0.7; }
    .logo-bar__item img {
      display: block;
      height: 28px;
      width: auto;
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1>Leadership coaching that moves people forward.</h1>
      <p>Work with leaders who've been in the room—and know how to help you grow.</p>
      <a href="#contact" class="btn">Book a call</a>
    </div>
  </section>

  <!-- LOGO BAR -->
  <div class="logo-bar">
    <div class="container">
      <div class="logo-bar__label">Clients have led and built at</div>
      <div class="logo-bar__logos">

        <div class="logo-bar__item">
          <img src="images/logo-lexus.png" alt="Lexus" height="28">
        </div>

        <div class="logo-bar__item">
          <img src="images/logo-toyota.png" alt="Toyota" height="28">
        </div>

        <div class="logo-bar__item">
          <img src="images/logo-convatec.png" alt="Convatec" height="28">
        </div>

        <div class="logo-bar__item">
          <img src="images/logo-arrow-planning.png" alt="Arrow Planning" height="28">
        </div>

        <div class="logo-bar__item">
          <img src="images/logo-next-energy.png" alt="Next Energy Capital" height="28">
        </div>

      </div>
    </div>
  </div>

</body>
</html>
